<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c4b5fd;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="url(#logoGrad)" />
  <!-- Brain/Neural network paths -->
  <g stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.9">
    <!-- Left hemisphere -->
    <path d="M40 45 C35 35, 30 40, 32 50 C30 55, 32 62, 38 65 C35 70, 38 78, 45 75" />
    <!-- Right hemisphere -->
    <path d="M80 45 C85 35, 90 40, 88 50 C90 55, 88 62, 82 65 C85 70, 82 78, 75 75" />
    <!-- Top connection -->
    <path d="M45 38 C50 30, 70 30, 75 38" />
    <!-- Middle connection -->
    <path d="M38 55 C45 50, 55 50, 60 52 C65 50, 75 50, 82 55" />
    <!-- Bottom connection -->
    <path d="M45 75 C50 80, 70 80, 75 75" />
    <!-- Neural nodes -->
    <circle cx="60" cy="42" r="3" fill="#fff" stroke="none" />
    <circle cx="60" cy="58" r="3" fill="#fff" stroke="none" />
    <circle cx="48" cy="50" r="2.5" fill="#fff" stroke="none" />
    <circle cx="72" cy="50" r="2.5" fill="#fff" stroke="none" />
    <circle cx="45" cy="65" r="2.5" fill="#fff" stroke="none" />
    <circle cx="75" cy="65" r="2.5" fill="#fff" stroke="none" />
    <!-- Vertical connections -->
    <line x1="60" y1="45" x2="60" y2="55" />
    <line x1="48" y1="52" x2="58" y2="56" />
    <line x1="72" y1="52" x2="62" y2="56" />
  </g>
  <!-- Document icon (bottom right) -->
  <g transform="translate(72, 70)">
    <rect x="0" y="0" width="24" height="30" rx="3" fill="url(#docGrad)" opacity="0.95" />
    <rect x="4" y="6" width="16" height="2" rx="1" fill="#4338ca" opacity="0.5" />
    <rect x="4" y="11" width="12" height="2" rx="1" fill="#4338ca" opacity="0.5" />
    <rect x="4" y="16" width="14" height="2" rx="1" fill="#4338ca" opacity="0.5" />
    <rect x="4" y="21" width="10" height="2" rx="1" fill="#4338ca" opacity="0.5" />
    <!-- Folded corner -->
    <path d="M18 0 L24 6 L18 6 Z" fill="#818cf8" />
  </g>
</svg>
